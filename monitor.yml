name: Crypto Opportunity Monitor

on:
  schedule:
    - cron: "*/15 * * * *"   # a cada 15 minutos
  workflow_dispatch: {}       # permite rodar manualmente pelo GitHub

permissions:
  contents: write            # necessário para o bot commitar o state.json atualizado

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar monitor
        run: python monitor.py

      - name: Salvar estado atualizado
        run: |
          git config user.name "crypto-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "chore: atualiza estado do monitor"
          git push
